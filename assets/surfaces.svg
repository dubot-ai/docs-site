<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Dubot product surfaces</title>
  <desc id="desc">Browserbot works in the product while a contextual sidepanel explains progress and requests approval.</desc>
  <defs>
    <linearGradient id="panel" x1="750" y1="90" x2="1100" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#4A5A8A" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="600" rx="16" fill="#F7F8FF"/>
  <g filter="url(#shadow)">
    <rect x="70" y="70" width="1060" height="460" rx="16" fill="white"/>
    <path d="M70 126h1060" stroke="#E4E5F1" stroke-width="2"/>
    <circle cx="105" cy="98" r="7" fill="#FF8A8A"/>
    <circle cx="129" cy="98" r="7" fill="#FFD36B"/>
    <circle cx="153" cy="98" r="7" fill="#129A5C"/>
    <rect x="198" y="84" width="500" height="28" rx="14" fill="#ECEDF8"/>
  </g>
  <text x="112" y="176" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" letter-spacing="1.2" fill="#354175">YOUR PRODUCT</text>
  <rect x="112" y="201" width="236" height="38" rx="10" fill="#FEEEE9"/>
  <rect x="112" y="263" width="540" height="96" rx="16" fill="#F7F8FF" stroke="#E4E5F1" stroke-width="2"/>
  <rect x="142" y="288" width="176" height="14" rx="7" fill="#9EA8C8"/>
  <rect x="142" y="316" width="398" height="11" rx="5.5" fill="#E4E5F1"/>
  <rect x="112" y="383" width="200" height="50" rx="8" fill="#0D1341"/>
  <text x="158" y="415" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="16" font-weight="700" fill="white">Update setting</text>
  <circle cx="314" cy="408" r="34" fill="#ECEDF8" stroke="#0D1341" stroke-width="3"/>
  <path d="m302 408 8 8 17-18" stroke="#0D1341" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M348 408h58" stroke="#0D1341" stroke-width="3" stroke-dasharray="7 7"/>
  <rect x="406" y="383" width="214" height="50" rx="8" fill="#FFFFFF" stroke="#0D1341" stroke-width="2"/>
  <text x="441" y="415" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="16" font-weight="700" fill="#0D1341">Browserbot focus</text>
  <rect x="730" y="126" width="400" height="404" fill="url(#panel)"/>
  <path d="M730 126v404" stroke="#E4E5F1" stroke-width="2"/>
  <rect x="762" y="158" width="94" height="30" rx="8" fill="#0D1341"/>
  <text x="784" y="179" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="13" font-weight="700" fill="white">DUBOT</text>
  <text x="762" y="233" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="25" font-weight="700" fill="#0D1341">Update your setting</text>
  <text x="762" y="268" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="15" fill="#354175">I found the correct account screen.</text>
  <text x="762" y="292" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="15" fill="#354175">Review the change before continuing.</text>
  <rect x="762" y="330" width="336" height="72" rx="8" fill="#FEEEE9" stroke="#F4BEAE" stroke-width="2"/>
  <circle cx="793" cy="366" r="13" fill="#EA6242"/>
  <path d="m787 366 4 4 8-9" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="819" y="361" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing=".8" fill="#EA6242">YOUR DECISION</text>
  <text x="819" y="382" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="15" font-weight="700" fill="#0D1341">Ready for your approval</text>
  <rect x="762" y="430" width="212" height="52" rx="4" fill="#D64B2A"/>
  <text x="809" y="462" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="15" font-weight="700" fill="white">Approve change</text>
  <text x="994" y="461" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" text-decoration="underline" fill="#354175">Cancel</text>
  <rect x="91" y="472" width="570" height="36" rx="18" fill="#0D1341"/>
  <text x="116" y="495" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="14" font-weight="700" fill="white">BROWSERBOT</text>
  <text x="226" y="495" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="14" fill="#E4E5F1">Works with the live product interface</text>
  <rect x="914" y="82" width="180" height="32" rx="4" fill="#FEEEE9" stroke="#F4BEAE"/>
  <text x="940" y="103" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing=".8" fill="#EA6242">CONTEXTUAL SIDEPANEL</text>
</svg>
