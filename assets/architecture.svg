<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Dubot architecture</title>
  <desc id="desc">A customer request passes from support AI through Dubot controls to approved product surfaces and a verified product result.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F8FF"/>
      <stop offset="1" stop-color="#ECEDF8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9EA8C8"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="16" fill="url(#bg)"/>
  <text x="64" y="70" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" letter-spacing="1.2" fill="#EA6242">FROM ANSWER TO ACTION</text>
  <path d="M286 270H380" stroke="#9EA8C8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M814 270H908" stroke="#9EA8C8" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <rect x="64" y="162" width="222" height="216" rx="16" fill="white"/>
    <circle cx="111" cy="211" r="23" fill="#FEEEE9"/>
    <path d="M100 207h22M100 215h14" stroke="#EA6242" stroke-width="3" stroke-linecap="round"/>
    <text x="96" y="268" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="25" font-weight="700" fill="#0D1341">Support intent</text>
    <text x="96" y="305" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="16" fill="#354175">Customer request</text>
    <text x="96" y="330" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="16" fill="#354175">and relevant context</text>
  </g>
  <g>
    <rect x="380" y="112" width="434" height="316" rx="16" fill="#0D1341"/>
    <rect x="412" y="144" width="110" height="34" rx="4" fill="#D64B2A"/>
    <text x="437" y="167" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="white">DUBOT</text>
    <text x="412" y="225" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="28" font-weight="700" fill="white">Approved action layer</text>
    <rect x="412" y="257" width="169" height="54" rx="8" fill="#192050"/>
    <circle cx="439" cy="284" r="10" fill="#B8E2C8"/>
    <text x="459" y="290" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="15" fill="#FFFFFF">Known journey</text>
    <rect x="593" y="257" width="189" height="54" rx="8" fill="#192050"/>
    <circle cx="620" cy="284" r="10" fill="#F2D499"/>
    <text x="640" y="290" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="15" fill="#FFFFFF">Approval points</text>
    <rect x="412" y="323" width="169" height="54" rx="8" fill="#192050"/>
    <circle cx="439" cy="350" r="10" fill="#9EA8C8"/>
    <text x="459" y="356" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="15" fill="#FFFFFF">State checks</text>
    <rect x="593" y="323" width="189" height="54" rx="8" fill="#192050"/>
    <circle cx="620" cy="350" r="10" fill="#F4BEAE"/>
    <text x="640" y="356" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="15" fill="#FFFFFF">Verification</text>
  </g>
  <g>
    <rect x="908" y="162" width="228" height="216" rx="16" fill="white"/>
    <circle cx="955" cy="211" r="23" fill="#E8F7EE"/>
    <path d="m944 211 7 7 15-16" stroke="#129A5C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="940" y="268" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="25" font-weight="700" fill="#0D1341">Product result</text>
    <text x="940" y="305" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="16" fill="#354175">Guided or performed</text>
    <text x="940" y="330" font-family="Schibsted Grotesk, Arial, sans-serif" font-size="16" fill="#354175">and then verified</text>
  </g>
</svg>
